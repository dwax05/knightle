<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>knightle</title>
    <meta name="description" content="A Wordle clone for UCF Knights — daily word puzzles with accounts, stats, and 2-player versus mode" />
    <script>
      try {
        var css = localStorage.getItem("cache:theme:v2");
        if (css) {
          var s = document.createElement("style");
          s.id = "user-theme";
          s.textContent = css;
          document.head.appendChild(s);
        }
      } catch(e) {}
    </script>
  </head>
  <body>
    <div id="root">
      <main class="min-h-screen flex items-center justify-center">
        <h1 class="text-3xl font-bold text-fg">Knightle</h1>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
